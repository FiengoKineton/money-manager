{% extends "base.html" %}

{% block content %}
<section class="form-section">
  <h2>Transaction #{{ tx.id }} ({{ tx.type|capitalize }})</h2>

  <form method="post" class="transaction-form">
    <div>
      <label>Date</label>
      <input type="date" name="date" value="{{ tx.date }}">
    </div>

    <div>
      <label>Category</label>
      <input type="text" name="category" value="{{ tx.category }}">
    </div>

    <div>
      <label>Sub-category</label>
      <input type="text" name="sub_category" value="{{ tx.sub_category }}">
    </div>

    <div>
      <label>Amount</label>
      <input type="number" step="0.01" name="amount" value="{{ tx.amount }}">
    </div>

    <div>
      <label>Account</label>
      <input type="text" name="account" value="{{ tx.account }}">
    </div>

    <div style="grid-column: 1 / -1;">
      <label>Description</label>
      <textarea name="description" rows="2">{{ tx.description }}</textarea>
    </div>

    <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
      <button type="submit" name="action" value="update">Save changes</button>
      <button type="submit" name="action" value="delete"
              style="background:#b00020; color:#fff;">
        Delete
      </button>
      <a href="{{ url_for('index') }}" style="align-self:center; margin-left:auto;">
        Back to list
      </a>
    </div>
  </form>
</section>
{% endblock %}
