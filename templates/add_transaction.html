<!-- templates/add_transaction.html -->
{% extends "base.html" %}

{% block content %}
<section class="form-section">
  <h2>Add {{ ttype.capitalize() }}</h2>
  <form method="post" class="transaction-form">
    <input type="hidden" name="type" value="{{ ttype }}">

    <div>
      <label>Date</label>
      <input type="date" name="date" value="{{ today }}" required>
    </div>

    <div>
      <label>Category</label>
      <select name="category" required>
        {% for c in categories %}
          <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label>Sub-category (optional)</label>
      <input type="text" name="sub_category">
    </div>

    <!-- MULTI AMOUNT BLOCK -->
    <div style="grid-column: 1 / -1;">
      <label>Amounts (multiple)</label>

      <div id="amount-list">
        <input type="number" step="0.01" class="amount-input" placeholder="0.00">
      </div>

      <button type="button" onclick="addAmountField()">+ Add another</button>

      <p>
        <strong>Total: € <span id="total-amount">0.00</span></strong>
      </p>

      <!-- THIS is what backend reads -->
      <input type="hidden" name="amount" id="amount-hidden">
    </div>

    <div>
      <label>Account</label>
      <input type="text" name="account" placeholder="Bank, Card, Cash...">
    </div>

    <div>
      <label>Description</label>
      <textarea name="description" rows="2"></textarea>
    </div>

    <div>
      <button type="submit">Save</button>
    </div>
  </form>
</section>
{% endblock %}


{% block scripts %}
<script>
function updateTotal() {
  const inputs = document.querySelectorAll('.amount-input');
  let total = 0;

  inputs.forEach(input => {
    const val = parseFloat(input.value);
    if (!isNaN(val)) total += val;
  });

  document.getElementById('total-amount').innerText = total.toFixed(2);
  document.getElementById('amount-hidden').value = total.toFixed(2);
}

function addAmountField() {
  const container = document.getElementById('amount-list');

  const input = document.createElement('input');
  input.type = 'number';
  input.step = '0.01';
  input.className = 'amount-input';
  input.placeholder = '0.00';

  input.addEventListener('input', updateTotal);

  container.appendChild(input);
}

// initialize everything
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.amount-input').forEach(input => {
    input.addEventListener('input', updateTotal);
  });

  // 🔥 important: initialize hidden value to 0
  updateTotal();
});
</script>
{% endblock %}
