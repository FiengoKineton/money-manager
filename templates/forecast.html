{% extends "base.html" %}

{% block content %}

<section class="form-section">
  <h2>Financial Forecast</h2>

  <form method="post" class="transaction-form">

    <div>
      <label>Monthly Income (€)</label>
      <input type="number" name="income" step="0.01" required>
    </div>

    <div>
      <label>Monthly Expenses (€)</label>
      <input type="number" name="expenses" step="0.01" required>
    </div>

    <div>
      <label>Monthly Investment (€)</label>
      <input type="number" name="investment" step="0.01" required>
    </div>

    <div>
      <label>Years</label>
      <input type="number" name="years" value="5">
    </div>

    <div>
      <label>Annual Return (%)</label>
      <input type="number" name="rate" value="5" step="0.1">
    </div>

    <button type="submit">Run Forecast</button>
  </form>
</section>

{% if result %}
<section class="summary">
  <div class="summary-card net">
    <h3>Projected Value after {{ result.years }} years</h3>
    <p>{{ '%.2f'|format(result.final_value) }}</p>
  </div>
</section>

<section class="plots">
  <img src="{{ url_for('static', filename='plots/forecast.png') }}">
</section>
{% endif %}

{% endblock %}
