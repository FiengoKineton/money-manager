{% extends "base.html" %}

{% block content %}
<section class="form-section">
  <h2>Add {{ ttype.capitalize() }}</h2>

  <form method="post" class="transaction-form">
    <div>
      <label>Date</label>
      <input type="date" name="date" value="{{ today }}">
    </div>

    <div>
      <label>Category</label>
      <input type="text" name="category" placeholder="Category">
    </div>

    <div>
      <label>Sub-category</label>
      <input type="text" name="sub_category" placeholder="Sub-category (optional)">
    </div>

    <div>
      <label>Amount</label>
      <input type="number" step="0.01" name="amount" placeholder="0.00">
    </div>

    <div>
      <label>Account</label>
      <input type="text" name="account" placeholder="e.g. Card, Cash">
    </div>

    <div style="grid-column:1/-1;">
      <label>Description</label>
      <textarea name="description" rows="2" placeholder="Optional note"></textarea>
    </div>

    <input type="hidden" name="type" value="{{ ttype }}">

    <div>
      <button type="submit">Save</button>
    </div>
  </form>
</section>
{% endblock %}
